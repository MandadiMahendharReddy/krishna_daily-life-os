{% extends "base.html" %}
{% block title %}Login - Krishna Daily Life OS{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="card app-card">
    <div class="card-body">
      <h1 class="h4 mb-3">Login</h1>
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary w-100" type="submit">Login</button>
      </form>
      <p class="mt-3 mb-0 text-center">New here? <a href="{% url 'register' %}">Create account</a></p>
    </div>
  </div>
</div>
{% endblock %}
